<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative ring illustration -->
  <circle cx="100" cy="100" r="60" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="45" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="100" r="75" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <!-- Diamond shape on top -->
  <polygon points="100,30 108,45 100,40 92,45" fill="#C9A84C" opacity="0.4"/>
  <polygon points="100,28 106,40 100,36 94,40" fill="#C9A84C" opacity="0.6"/>
  <!-- Light rays -->
  <line x1="100" y1="20" x2="100" y2="10" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  <line x1="110" y1="22" x2="115" y2="14" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
  <line x1="90" y1="22" x2="85" y2="14" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
</svg>
